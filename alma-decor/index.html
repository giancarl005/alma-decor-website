    /* Premium Design Utilities */
    .grain-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");

    .admin-card {
      background: white;
      border: 1px solid #f3f4f6;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    html.dark .admin-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .admin-card:hover {
      border-color: #FFCC00;
      transform: translateY(-2px);
      box-shadow: 0 20px 40px -20px rgba(0,0,0,0.05);
    }

    html {
        scroll-behavior: smooth;
    }

    main {
      transition: margin-left 0.3s ease-in-out;
    }

    .sidebar-collapsed main {
      margin-left: 5rem !important;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* A definitive solution to override browser autofill styles in LIGHT mode */
