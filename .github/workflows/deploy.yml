name: Deploy Alma Decor

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install & Build Admin
        working-directory: ./alma-decor
        run: |
          npm install
          npm run build

      - name: 📦 Install & Build Storefront (Next.js)
        working-directory: ./alma-decor-next
        run: |
          npm install
          npm run build

      - name: 🚀 Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: "public_html/"
          security: ftps
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/src/**
            alma-decor-next/.next/cache/**
