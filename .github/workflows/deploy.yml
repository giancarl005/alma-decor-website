name: Deploy Alma Decor

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install & Build Admin
        working-directory: ./alma-decor
        run: |
          npm install
          npm run build

      - name: 📦 Install & Build Storefront (Next.js)
        working-directory: ./alma-decor-next
        run: |
          npm install
          npm run build

      - name: 🚀 Deploy to cPanel via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "."
          target: "/home/${{ secrets.SSH_USER }}/public_html"
          rm: false
          strip_components: 0
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/src/**
            alma-decor-next/.next/cache/**

      - name: 🔄 Restart Node.js App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /home/${{ secrets.SSH_USER }}/public_html/alma-decor-next
            mkdir -p tmp
            touch tmp/restart.txt
