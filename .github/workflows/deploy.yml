name: Deploy Alma Decor

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install & Build Admin
        working-directory: ./alma-decor
        run: |
          npm install
          npm run build

      - name: 📦 Install & Build Storefront (Next.js)
        working-directory: ./alma-decor-next
        run: |
          npm install
          npm run build

      - name: 🚀 Deploy to cPanel via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SSH_USER }}
          server: ${{ secrets.SSH_HOST }}
          ssh_private_key: ${{ secrets.SSH_KEY }}
          local_path: './*'
          remote_path: '/home/${{ secrets.SSH_USER }}/public_html'
          args: '-o ConnectTimeout=5'

      - name: 🔄 Restart Node.js App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.SSH_USER }}/public_html/alma-decor-next
            mkdir -p tmp
            touch tmp/restart.txt
